<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无职转生 全文搜索</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #121212;
  --surface: #1e1e2e;
  --surface2: #252536;
  --border: #2a2a3a;
  --text: #d0d0d8;
  --text2: #8888a0;
  --text3: #606078;
  --accent: #6a8cff;
  --accent-dim: #4a6ccc;
  --mark-bg: rgba(255, 200, 60, 0.35);
  --mark-text: #ffe8a0;
  --danger: #ff6b6b;
}
html { font-size: 15px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 720px; margin: 0 auto; padding: 16px; }

/* Header */
.header { text-align: center; padding: 24px 0 16px; }
.header h1 { font-size: 1.5rem; font-weight: 700; color: #e8e8f0; letter-spacing: 0.03em; }
.header p { font-size: 0.8rem; color: var(--text3); margin-top: 4px; }

/* Loading */
#loading { 
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 48px 16px; gap: 12px;
}
#loading .spinner {
  width: 36px; height: 36px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading .progress-text { font-size: 0.85rem; color: var(--text2); }
#loading .progress-bar-wrap {
  width: 100%; max-width: 320px; height: 4px; background: var(--surface2);
  border-radius: 2px; overflow: hidden;
}
#loading .progress-bar-fill {
  height: 100%; background: var(--accent); border-radius: 2px;
  transition: width 0.15s ease; width: 0%;
}

/* Search */
#search-area { display: none; margin-bottom: 12px; }
.search-box {
  display: flex; gap: 8px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 4px; transition: border-color 0.2s;
}
.search-box:focus-within { border-color: var(--accent); }
.search-box input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-size: 0.95rem; padding: 10px 8px;
}
.search-box input::placeholder { color: var(--text3); }
.search-box button {
  background: var(--accent); color: #fff; border: none; border-radius: 7px;
  padding: 10px 18px; font-size: 0.9rem; font-weight: 600; cursor: pointer;
  transition: background 0.2s; white-space: nowrap;
}
.search-box button:hover { background: var(--accent-dim); }
.search-box button:active { transform: scale(0.97); }

/* Stats */
#stats { display: none; font-size: 0.8rem; color: var(--text3); margin-bottom: 8px; padding: 0 4px; }
#stats b { color: var(--text2); }

/* Results */
#results { display: none; }
.result-item {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px 16px; margin-bottom: 8px; transition: border-color 0.15s;
}
.result-item:hover { border-color: var(--accent-dim); }
.result-path {
  font-size: 0.72rem; color: var(--text3); margin-bottom: 6px;
  letter-spacing: 0.02em;
}
.result-path .sep { color: var(--border); margin: 0 4px; }
.result-text {
  font-size: 0.88rem; line-height: 1.65; word-break: break-all;
}
.result-text mark {
  background: var(--mark-bg); color: var(--mark-text);
  padding: 1px 3px; border-radius: 2px;
}

/* Load more */
#load-more-wrap { display: none; text-align: center; padding: 16px 0 32px; }
#load-more-btn {
  background: var(--surface2); color: var(--text2); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 32px; font-size: 0.85rem; cursor: pointer;
  transition: all 0.15s;
}
#load-more-btn:hover { background: var(--surface); color: var(--text); border-color: var(--accent-dim); }

/* Empty / No results */
.empty-state { text-align: center; padding: 48px 16px; color: var(--text3); }
.empty-state .icon { font-size: 2.5rem; margin-bottom: 8px; opacity: 0.5; }
.empty-state p { font-size: 0.85rem; }

/* Error */
.error-msg { 
  text-align: center; padding: 32px; color: var(--danger);
  font-size: 0.9rem;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>无职转生 全文搜索</h1>
    <p>全29卷 · 离线纯前端 · 107,150 段落</p>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <div class="progress-text" id="progress-text">正在加载数据文件...</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
  </div>

  <div id="search-area">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="输入关键词，空格分隔，AND 逻辑..." autofocus autocomplete="off">
      <button id="search-btn">搜索</button>
    </div>
  </div>

  <div id="stats"></div>
  <div id="results"></div>
  <div id="load-more-wrap">
    <button id="load-more-btn">加载更多</button>
  </div>

  <div id="empty-hint" class="empty-state" style="display:none">
    <div class="icon">&#128269;</div>
    <p>在上方输入关键词开始搜索</p>
  </div>
</div>

<script>
(function() {
  'use strict';

  var CHUNKS = null;
  var allMatches = [];
  var displayCount = 0;
  var PAGE_SIZE = 50;
  var searchTime = 0;

  var $loading = document.getElementById('loading');
  var $progressText = document.getElementById('progress-text');
  var $progressFill = document.getElementById('progress-fill');
  var $searchArea = document.getElementById('search-area');
  var $searchInput = document.getElementById('search-input');
  var $searchBtn = document.getElementById('search-btn');
  var $stats = document.getElementById('stats');
  var $results = document.getElementById('results');
  var $loadMoreWrap = document.getElementById('load-more-wrap');
  var $loadMoreBtn = document.getElementById('load-more-btn');
  var $emptyHint = document.getElementById('empty-hint');

  // -- Load data.js with progress --
  function loadData() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'data.js', true);
    
    xhr.onprogress = function(e) {
      if (e.lengthComputable) {
        var pct = (e.loaded / e.total * 100).toFixed(0);
        var loadedKB = (e.loaded / 1024).toFixed(0);
        var totalKB = (e.total / 1024).toFixed(0);
        $progressText.textContent = '正在加载数据文件... ' + pct + '% （' + loadedKB + ' / ' + totalKB + ' KB）';
        $progressFill.style.width = pct + '%';
      } else {
        var loadedKB = (e.loaded / 1024).toFixed(0);
        $progressText.textContent = '正在加载数据文件... 已下载 ' + loadedKB + ' KB';
      }
    };

    xhr.onload = function() {
      if (xhr.status === 200 || xhr.status === 0) {
        $progressText.textContent = '正在解析数据...';
        $progressFill.style.width = '100%';
        try {
          // data.js is "window.CHUNKS=[...];"
          // Extract JSON array part
          var text = xhr.responseText;
          var start = text.indexOf('[');
          var end = text.lastIndexOf(']');
          if (start >= 0 && end > start) {
            var jsonPart = text.substring(start, end + 1);
            // Use eval for speed (trusted local file)
            CHUNKS = (new Function('return ' + jsonPart))();
          } else {
            // fallback: direct eval
            new Function(text)();
            CHUNKS = window.CHUNKS;
          }
          onDataReady();
        } catch (err) {
          $loading.innerHTML = '<div class="error-msg">数据解析失败：' + err.message + '</div>';
        }
      } else {
        $loading.innerHTML = '<div class="error-msg">加载失败（HTTP ' + xhr.status + '），请检查 data.js 是否存在。</div>';
      }
    };

    xhr.onerror = function() {
      $loading.innerHTML = '<div class="error-msg">加载失败，请检查网络连接或文件路径。</div>';
    };

    xhr.send();
  }

  function onDataReady() {
    $loading.style.display = 'none';
    $searchArea.style.display = 'block';
    $emptyHint.style.display = 'block';
    $searchInput.focus();
  }

  // -- Search --
  function doSearch() {
    var raw = $searchInput.value.trim();
    if (!raw) {
      $stats.style.display = 'none';
      $results.style.display = 'none';
      $loadMoreWrap.style.display = 'none';
      $emptyHint.style.display = 'block';
      return;
    }

    var keywords = raw.split(/\s+/).filter(function(k) { return k.length > 0; });
    if (keywords.length === 0) {
      $stats.style.display = 'none';
      $results.style.display = 'none';
      $loadMoreWrap.style.display = 'none';
      $emptyHint.style.display = 'block';
      return;
    }

    $emptyHint.style.display = 'none';
    var startTime = performance.now();

    var lowerKeywords = keywords.map(function(k) { return k.toLowerCase(); });
    allMatches = [];
    
    var total = CHUNKS.length;
    for (var i = 0; i < total; i++) {
      var chunk = CHUNKS[i];
      var text = chunk[3];
      var lowerText = text.toLowerCase();
      var allMatch = true;
      var hitCount = 0;
      for (var k = 0; k < lowerKeywords.length; k++) {
        var kw = lowerKeywords[k];
        var pos = lowerText.indexOf(kw);
        if (pos === -1) { allMatch = false; break; }
        // count occurrences
        var cnt = 0;
        var searchPos = 0;
        while ((searchPos = lowerText.indexOf(kw, searchPos)) !== -1) {
          cnt++;
          searchPos += kw.length;
        }
        hitCount += cnt;
      }
      if (allMatch) {
        allMatches.push({
          idx: i,
          vol: chunk[0],
          ch: chunk[1],
          chName: chunk[2],
          text: text,
          density: hitCount / Math.max(text.length, 1)
        });
      }
    }

    // Sort by original index (vol+ch order), then by density desc within same vol+ch
    allMatches.sort(function(a, b) {
      if (a.vol !== b.vol) return a.idx - b.idx;
      if (a.ch !== b.ch) return a.idx - b.idx;
      return b.density - a.density;
    });

    // Limit to 5 per vol+ch group
    var filtered = [];
    var groupCount = {};
    for (var j = 0; j < allMatches.length; j++) {
      var m = allMatches[j];
      var key = m.vol + '|||' + m.ch;
      if (!groupCount[key]) groupCount[key] = 0;
      if (groupCount[key] < 5) {
        groupCount[key]++;
        filtered.push(m);
      }
    }
    allMatches = filtered;

    var endTime = performance.now();
    searchTime = (endTime - startTime).toFixed(1);

    displayCount = 0;
    $stats.style.display = 'block';
    $stats.innerHTML = '搜索耗时 <b>' + searchTime + ' ms</b>，共 <b>' + allMatches.length + '</b> 条匹配（每卷每话最多 5 条）';
    
    renderNext();
  }

  function highlightText(text, keywords) {
    var escaped = keywords.map(function(k) {
      return k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    });
    var regex = new RegExp('(' + escaped.join('|') + ')', 'gi');
    var safe = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    return safe.replace(regex, '<mark>$1</mark>');
  }

  function renderNext() {
    var keywords = $searchInput.value.trim().split(/\s+/).filter(function(k) { return k.length > 0; });
    var end = Math.min(displayCount + PAGE_SIZE, allMatches.length);
    var html = '';
    
    for (var i = displayCount; i < end; i++) {
      var m = allMatches[i];
      var path = m.vol + ' <span class="sep">&gt;</span> ' + m.ch;
      var highlighted = highlightText(m.text, keywords);
      html += '<div class="result-item">' +
        '<div class="result-path">' + path + '</div>' +
        '<div class="result-text">' + highlighted + '</div>' +
        '</div>';
    }
    
    if (displayCount === 0) {
      $results.innerHTML = html;
    } else {
      $results.insertAdjacentHTML('beforeend', html);
    }
    
    displayCount = end;
    
    if (displayCount >= allMatches.length) {
      $loadMoreWrap.style.display = 'none';
    } else {
      $loadMoreWrap.style.display = 'block';
    }
    
    $results.style.display = (allMatches.length > 0) ? 'block' : 'none';
    if (allMatches.length === 0) {
      $results.innerHTML = '<div class="empty-state"><div class="icon">&#128269;</div><p>没有找到匹配的段落</p></div>';
      $results.style.display = 'block';
    }
  }

  // -- Events --
  $searchBtn.addEventListener('click', function() {
    doSearch();
  });

  $searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      doSearch();
    }
  });

  $loadMoreBtn.addEventListener('click', function() {
    renderNext();
  });

  // -- Init --
  // 检测是否通过 script 标签已加载（file:// 兼容路径）
  if (window.CHUNKS && window.CHUNKS.length > 0) {
    CHUNKS = window.CHUNKS;
    $progressText.textContent = '正在解析数据...';
    $progressFill.style.width = '100%';
    setTimeout(onDataReady, 50);
  } else {
    // HTTP 部署时用 XHR 带进度条；file:// 下 XHR 会失败，由下方 script 标签兜底
    loadData();
  }

  // 暴露备用初始化，供 data.js 的 script 标签 onload 调用（file:// 场景）
  window._initFromScript = function() {
    if (CHUNKS) return; // 已通过 XHR 初始化
    if (window.CHUNKS && window.CHUNKS.length > 0) {
      CHUNKS = window.CHUNKS;
      $progressText.textContent = '正在解析数据...';
      $progressFill.style.width = '100%';
      setTimeout(onDataReady, 50);
    }
  };

})();
</script>
<script src="data.js" onload="if(window._initFromScript)window._initFromScript()"></script>
</body>
</html>
